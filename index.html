<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Brick Breaker Messi ⚽</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">⚽ Brick Breaker Messi</span>
    <span class="text-white">Score: <span id="score">0</span> | High Score: <span id="highScore">0</span></span>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container text-center mt-3">

  <h5>Nivel: <span id="level">1</span></h5>

  <!-- INSTRUCCIONES -->
  <div class="alert alert-info">
    Usa el mouse  para mover a Messi ⚽ <br>
    Rompe todos los bloques para avanzar de nivel <br>
  </div>

  <!-- CANVAS -->
  <canvas id="gameCanvas"></canvas>

  <!-- MENSAJES -->
  <div id="message" class="mt-3"></div>

</div>

<div class="container mt-3">
  <div class="row align-items-center">

    <!-- IZQUIERDA: BOTÓN START -->
    <div class="col-md-4 text-start">
      <button id="startBtn" class="btn btn-success">▶ START</button>
    </div>

    <!-- CENTRO: NIVEL -->
    <div class="col-md-4 text-center">
      <h5>Nivel: <span id="level">1</span></h5>
    </div>

    <!-- DERECHA: SCORE + VIDAS -->
    <div class="col-md-4 text-end">
      <div>Score: <span id="score">0</span></div>
      <div>Vidas: <span id="lives">3</span></div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-2 mt-4">
  Martin Arturo Escorza - Brick Breaker Messi ⚽
</footer>

<script src="./assets/js/game.js"></script>
</body>
</html>
